name: Build & publish slides PDF

on:
  push:
    branches: [main, solutions]
    paths:
      - 'slides/slides.md'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/build-slides-pdf.yml'
  workflow_dispatch:

concurrency:
  group: slides-pdf
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Chromium for Playwright
        run: pnpm exec playwright install --with-deps chromium

      - name: Export slides to PDF
        run: pnpm export

      - name: Publish rolling "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: slides-latest
          name: Latest slides PDF
          body: |
            Auto-built from `slides/slides.md` on `${{ github.ref_name }}` at commit ${{ github.sha }}.

            Download: [`slides-export.pdf`](https://github.com/${{ github.repository }}/releases/latest/download/slides-export.pdf)
          files: slides-export.pdf
          make_latest: true
